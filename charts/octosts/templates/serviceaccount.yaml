apiVersion: v1
kind: ServiceAccount
metadata:
  # LOCKED: name must be `octosts` to match the Vault JWT role's
  # bound_claims.sub = system:serviceaccount:octosts:octosts (PR #423).
  # Do not template this with Release.Name or fullname.
  name: {{ .Values.serviceAccount.name }}
  labels:
    {{- include "octosts.labels" . | nindent 4 }}
