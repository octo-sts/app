name: Pre-commit

on:
  pull_request:
    branches:
      - 'main'
  push:
    branches:
      - 'main'

permissions: {}

jobs:

  pre-commit:
    name: Pre-commit checks
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: block
          allowed-endpoints: >
            *.blob.core.windows.net:443
            *.githubapp.com:443
            api.github.com:443
            dl.google.com:443
            github.com:443
            go.dev:443
            golangci-lint.run:443
            objects.githubusercontent.com:443
            proxy.golang.org:443
            pypi.org:443
            files.pythonhosted.org:443
            raw.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            checkpoint-api.hashicorp.com:443
            releases.hashicorp.com:443
            storage.googleapis.com:443
            sum.golang.org:443

      - name: Check out code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: '${{ github.workspace }}/.go-version'
          check-latest: true
          cache: 'false'

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.x'

      - name: Install goimports
        run: go install golang.org/x/tools/cmd/goimports@latest

      - name: Set up Terraform
        uses: chainguard-dev/actions/setup-terraform@9978bf17926f53444b5eff45479954d94ec12e32 # v1.6.24
        with:
          terraform-version-file: "${{ github.workspace }}/.terraform-version"
          terraform-wrapper: false

      - name: Install pre-commit # Manually install as the precommit action doesn't pin deps.
        run: pip install pre-commit

      - name: Run pre-commit
        run: pre-commit run --all-files
        env:
          SKIP: no-commit-to-branch
