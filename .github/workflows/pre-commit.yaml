name: Pre-commit

on:
  pull_request:
    branches:
      - 'main'
  push:
    branches:
      - 'main'

permissions: {}

jobs:

  pre-commit:
    name: Pre-commit checks
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: block
          allowed-endpoints: >
            *.blob.core.windows.net:443
            *.githubapp.com:443
            api.github.com:443
            dl.google.com:443
            github.com:443
            go.dev:443
            golangci-lint.run:443
            objects.githubusercontent.com:443
            proxy.golang.org:443
            pypi.org:443
            files.pythonhosted.org:443
            raw.githubusercontent.com:443
            release-assets.githubusercontent.com:443
            checkpoint-api.hashicorp.com:443
            releases.hashicorp.com:443
            storage.googleapis.com:443
            sum.golang.org:443

      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: '${{ github.workspace }}/.go-version'
          check-latest: true
          cache: 'false'

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: '3.x'

      - name: Install goimports
        run: go install golang.org/x/tools/cmd/goimports@latest

      - name: Set up Terraform
        uses: chainguard-dev/actions/setup-terraform@c29bd2a0f4e71ad61a209c255c0164987df76aaa # v1.6.10
        with:
          terraform-version-file: "${{ github.workspace }}/.terraform-version"
          terraform-wrapper: false

      - name: Install pre-commit # Manually install as the precommit action doesn't pin deps.
        run: pip install pre-commit

      - name: Run pre-commit
        run: pre-commit run --all-files
        env:
          SKIP: no-commit-to-branch
